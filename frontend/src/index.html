<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Tenexa - Business Intelligence Dashboard</title>
  <meta name="description" content="Tenexa — Intelligent Business Intelligence Platform with Real-time Analytics">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#052659">
  <base href="/">

  <!-- Preload critical font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=optional" as="style" onload="this.onload=null;this.rel='stylesheet'">

  <style>
    /* Critical inline styles for above-the-fold */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #052659;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    /* Skip to main content link — hidden until focused */
    .skip-link {
      position: absolute;
      top: -60px;
      left: 16px;
      z-index: 9999;
      background: #052659;
      color: #ffffff;
      padding: 10px 18px;
      border-radius: 0 0 8px 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: top 0.2s ease;
      border: 2px solid #C1E8FF;
    }
    .skip-link:focus {
      top: 0;
      outline: 3px solid #C1E8FF;
      outline-offset: 2px;
    }
  </style>

</head>

<body>
  <!-- Skip to main content for keyboard/screen reader users -->
  <a href="#main-content" class="skip-link">Aller au contenu principal</a>
  <app-root></app-root>
</body>

</html>
